name: Intend
options:
  bundleIdPrefix: com.intend
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16"
  createIntermediateGroups: true
  developmentLanguage: en

packages:
  swift-markdown:
    url: https://github.com/apple/swift-markdown
    from: "0.4.0"

targets:
  Intend:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Assets.xcassets
    resources:
      - path: Resources
      - path: en.lproj/Localizable.strings
      - path: ko.lproj/Localizable.strings
    settings:
      base:
        PRODUCT_NAME: Intend
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        APP_SANDBOX_ENABLED: YES
        ENABLE_HARDENED_RUNTIME: YES
        INFOPLIST_FILE: Sources/App/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/App/Intend.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Xcode 16 debug dylib 비활성화 (_main 심볼 충돌 방지)
        ENABLE_DEBUG_DYLIB: NO
    dependencies:
      - package: swift-markdown
        product: Markdown

  IntendTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    settings:
      base:
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Intend
